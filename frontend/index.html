<!DOCTYPE html>
<html>
<head>
    <title>AI Vehicle Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="header">
        <h1>AI VEHICLE CONTROL PANEL</h1>
        <p>Smart Adaptive Car Dashboard</p>
    </div>

    <!-- INPUT PANEL -->
    <div class="panel input-panel">
        <h2>Vehicle Environment Input</h2>

        <div class="field">
            <label>Road Roughness</label>
            <input type="number" id="road" step="0.1" placeholder="0 - 10">
        </div>

        <div class="field">
            <label>Ambient Temperature (°C)</label>
            <input type="number" id="temp" step="0.1" placeholder="25">
        </div>

        <div class="field">
            <label>Vehicle Speed (km/h)</label>
            <input type="number" id="speed" step="0.1" placeholder="60">
        </div>

        <div class="field">
            <label>Raining?</label>
            <select id="rain">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <button onclick="predictSettings()">Analyze Vehicle</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="panel output-panel">
        <h2>AI Recommended Settings</h2>

        <div class="card">
            <span>Suspension</span>
            <h3 id="suspension">--</h3>
        </div>

        <div class="card">
            <span>AC Level</span>
            <h3 id="ac">--</h3>
        </div>

        <div class="card">
            <span>Tire Pressure</span>
            <h3 id="tire">--</h3>
        </div>

        <div class="card">
            <span>Speed Adjustment</span>
            <h3 id="speedAdjust">--</h3>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
